resources:
  jobs:
    deeds_pipeline:
      name: "[${bundle.target}] deeds_pipeline"
      description: "Daily: parse new docs (ai_parse_document) → extract entities (ai_extract v2.1) → batch analytics (review queues, no LLM judge). Stages 1-2 are streaming notebooks with Trigger.AvailableNow; stage 3 is plain batch. Tasks chained via depends_on — analytics never runs until extract commits."
      tasks:
        - task_key: parse
          notebook_task:
            notebook_path: ../src/pipelines/01_stream_parse.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              input_volume: ${var.input_volume}
              checkpoint_volume: ${var.checkpoint_volume}
              image_subfolder: ${var.image_subfolder}
              table_suffix: ${var.table_suffix}

        - task_key: extract
          depends_on:
            - task_key: parse
          notebook_task:
            notebook_path: ../src/pipelines/02_stream_extract.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              checkpoint_volume: ${var.checkpoint_volume}
              table_suffix: ${var.table_suffix}

        - task_key: analytics
          depends_on:
            - task_key: extract
          notebook_task:
            notebook_path: ../src/analytics/01_batch_analytics.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              low_extract_conf_threshold: ${var.low_extract_conf_threshold}
              high_conf_threshold: ${var.high_conf_threshold}
              no_citation_gate_conf: ${var.no_citation_gate_conf}
              mlflow_experiment: ${var.mlflow_experiment}
              table_suffix: ${var.table_suffix}

      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "UTC"
        pause_status: ${var.schedule_pause_status}
      max_concurrent_runs: 1
